### tmux.conf

# Override team colors from terminal
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal 'xterm-256color'

# Enable mouse inside tmux
set -g mouse on

# Reset prefix from CTRL+B to CTRL+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# List of plugins to download/use
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'

## Set catppuccin team flavor and other settings
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_default_text " #{window_name}"
set -ogq "@catppuccin_date_time_icon" " "
set -ogq "@catppuccin_date_time_text" " %Y-%m-%d %H:%M"
set -g status-right "#{E:@catppuccin_status_date_time}"
set -g status-left ""

## END OF FILE, don't add other stuff under here
run '/usr/share/tmux-plugin-manager/tpm'
